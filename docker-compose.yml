services:
  db:
    image: groonga/pgroonga:3.2.5-alpine-16
    environment:
      POSTGRES_DB: supavault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d

volumes:
  pgdata:
