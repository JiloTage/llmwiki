name: Deploy Cloudflare Worker

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - ".github/workflows/cloudflare-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: web

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
      LOCAL_ACCESS_TOKEN: ${{ secrets.LOCAL_ACCESS_TOKEN }}
      NEXT_PUBLIC_LOCAL_ACCESS_TOKEN: ${{ secrets.LOCAL_ACCESS_TOKEN }}
      APP_URL: ${{ vars.APP_URL }}
      NEXT_PUBLIC_APP_URL: ${{ vars.APP_URL }}
      NEXT_PUBLIC_LOCAL_USER_ID: ${{ vars.NEXT_PUBLIC_LOCAL_USER_ID }}
      NEXT_PUBLIC_LOCAL_USER_EMAIL: ${{ vars.NEXT_PUBLIC_LOCAL_USER_EMAIL }}
      NEXT_PUBLIC_MCP_URL: ${{ vars.NEXT_PUBLIC_MCP_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Validate required secrets and vars
        run: |
          python - <<'PY'
          import os

          required = [
              "CLOUDFLARE_API_TOKEN",
              "CLOUDFLARE_ACCOUNT_ID",
              "CLOUDFLARE_D1_DATABASE_ID",
              "LOCAL_ACCESS_TOKEN",
              "APP_URL",
              "NEXT_PUBLIC_LOCAL_USER_ID",
              "NEXT_PUBLIC_LOCAL_USER_EMAIL",
          ]

          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise SystemExit(f"Missing required GitHub secrets/vars: {', '.join(missing)}")
          PY

      - name: Install dependencies
        run: npm ci

      - name: Inject D1 database id
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("wrangler.jsonc")
          text = path.read_text()
          db_id = "${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}"
          if not db_id:
              raise SystemExit("CLOUDFLARE_D1_DATABASE_ID is required")
          path.write_text(text.replace("REPLACE_ME", db_id))
          PY

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build OpenNext bundle
        run: npx opennextjs-cloudflare build

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply llmwiki --remote

      - name: Deploy Worker
        run: npx wrangler deploy
